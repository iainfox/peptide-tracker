<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Peptide Tracker App</title>
    <script type="module" src="/src/main.ts" defer></script>
    <link rel="stylesheet" href="/src/styles.css" />
</head>

<body>
    <div id="peptides">
        <h2 id="date-title">
            Date
        </h2>

        <hr class="large-rule">

        <ul id="day-group">
            <li class="time-group">
                <ul class="list-data">
                    <h2 class="list-title">Time 1</h2>

                    <hr class="small-rule">

                    <li>
                        <label for="4">Peptide 1</label>
                        <input class="checkbox" type="checkbox" name="complete" id="1">
                        <input type="radio" class="radio" name="selected" id="4">
                    </li>
                </ul>

                <ul class="list-data">
                    <h2 class="list-title">Time 2</h2>

                    <hr class="small-rule">

                    <li>
                        <label for="5">Peptide 1</label>
                        <input class="checkbox" type="checkbox" name="complete" id="2">
                        <input type="radio" class="radio" name="selected" id="5">
                    </li>
                </ul>
            </li>
        </ul>
    </div>
</body>

</html>
