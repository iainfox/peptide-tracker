<body>
    <div class="main-container">
        <h1>Your Peptides</h1>

        <ul class="list-data">
            <li id="add">
                <label>Add a Peptide</label>

                </div>
            </li> 

            <li>
                <label>Peptide 1</label>
                <div class="button-group">
                    <button id="edit-button" aria-label="Edit"><svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg" xml:space="preserve" fill="none"><g stroke-width="0"></g><g stroke-linecap="round" stroke-linejoin="round"></g><g><path d="m104.175 90.97-4.252 38.384 38.383-4.252L247.923 15.427V2.497L226.78-18.646h-12.93zm98.164-96.96 31.671 31.67" class="cls-1" style="stroke-width:12;stroke-linecap:round;" transform="translate(-77.923 40.646)"></path></g></svg></button>

                </div>
            </li>
        </ul>
    </div>

    <nav id="home-bar">
        <ul id="nav-section">
            <li class="nav-item">
                <a href="calendar.html" aria-label="Calendar Page"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g stroke-width="0"></g><g stroke-linecap="round" stroke-linejoin="round"></g><g> <path d="M3 9H21M7 3V5M17 3V5M6 12H8M11 12H13M16 12H18M6 15H8M11 15H13M16 15H18M6 18H8M11 18H13M16 18H18M6.2 21H17.8C18.9201 21 19.4802 21 19.908 20.782C20.2843 20.5903 20.5903 20.2843 20.782 19.908C21 19.4802 21 18.9201 21 17.8V8.2C21 7.07989 21 6.51984 20.782 6.09202C20.5903 5.71569 20.2843 5.40973 19.908 5.21799C19.4802 5 18.9201 5 17.8 5H6.2C5.0799 5 4.51984 5 4.09202 5.21799C3.71569 5.40973 3.40973 5.71569 3.21799 6.09202C3 6.51984 3 7.07989 3 8.2V17.8C3 18.9201 3 19.4802 3.21799 19.908C3.40973 20.2843 3.71569 20.5903 4.09202 20.782C4.51984 21 5.07989 21 6.2 21Z" stroke-width="2" stroke-linecap="round"></path> </g></svg></a>

    <form id="add-menu">
        <hr id="drag_bar" class="large-rule drag-rule">
        
        <div class="input-section">
            <div class="input-title">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><g stroke-width="0"></g><g stroke-linecap="round" stroke-linejoin="round"></g><g> <g id="Pill"> <path d="M19.31,4.691a5.5,5.5,0,0,0-7.78,0l-6.84,6.84a5.5,5.5,0,0,0,3.89,9.39,5.524,5.524,0,0,0,3.89-1.61l6.84-6.84a5.5,5.5,0,0,0,0-7.78Zm-.71,7.07-3.42,3.42L8.82,8.821,12.24,5.4a4.5,4.5,0,0,1,7.68,3.17A4.429,4.429,0,0,1,18.6,11.761Z"></path> </g> </g></svg>
                <h2>Peptide Name</h2>
            </div>

            <div class="input-area">
                <input type="text" name="peptide_name" id="peptide_name" placeholder="Enter a peptide name">
            </div>
        </div>
        
        <div class="input-section">
            <div class="input-title">
                <svg version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512" xml:space="preserve"><g stroke-width="0"></g><g stroke-linecap="round" stroke-linejoin="round"></g><g> <g> <g> <path d="M364.058,220.747c0-24.422-16.346-45.099-38.671-51.666v-45.247h10.228c11.151,0,20.19-9.04,20.19-20.19V20.19 c0-11.15-9.04-20.19-20.19-20.19H176.384c-11.15,0-20.19,9.04-20.19,20.19v83.454c0,11.151,9.04,20.19,20.19,20.19h10.228v45.247 c-22.325,6.566-38.671,27.244-38.671,51.666c0,10.045,0,226.982,0,237.412c0,29.688,24.153,53.841,53.841,53.841h108.436 c29.688,0,53.841-24.153,53.841-53.841C364.059,449.927,364.058,241.274,364.058,220.747z M323.677,282.664H188.321v-61.917 c0-7.422,6.038-13.46,13.46-13.46h5.021c11.15,0,20.19-9.04,20.19-20.19v-63.262h58.014v63.262c0,11.15,9.04,20.19,20.19,20.19 h5.021c7.422,0,13.46,6.038,13.46,13.46V282.664z"></path> </g> </g> </g></svg> 
                <h2>Vial Info</h2>
            </div>
            <div class="input-area">
                <label for="dilutent_volume">Dilutent</label>
                <input class="number" placeholder="2" min="0" max="999" type="number" name="dilutent_volume" id="dilutent_volume">
                <input type="hidden" name="dilutent_unit" value="ml">
                <abbr class="unit unit-static" id="dilutent_unit_display" title="milliliters">ml</abbr>
            </div>
            
            <div class="input-area">
                <label for="peptide_mass">Peptide</label>
                <input class="number" placeholder="5" min="0" max="999" type="number" name="peptide_mass" id="peptide_mass">
                
                <select class="unit" name="peptide_unit" id="peptide_unit">
                    <option value="mg">mg</option>
                    <option value="mcg">mcg</option>
                </select>
            </div>
            
            <div class="input-area">
                <h3>Concentration</h3>
                <p class="number" id="concentration">2.5</p>

                <input type="hidden" name="dilutent_unit" value="ml">
                <abbr class="unit unit-static" id="concentration_unit_display" title="milligrams per milliliters">mg/ml</abbr>
            </div>
        </div>
        
        <div class="input-section">
            <div class="input-title">
                <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><g stroke-width="0"></g><g stroke-linecap="round" stroke-linejoin="round"></g><g> <path fill-rule="evenodd" clip-rule="evenodd" d="M4.35354 10.7175C3.37723 11.6938 3.37723 13.2767 4.35354 14.253L5.76776 15.6673C6.74407 16.6436 8.32698 16.6436 9.30329 15.6673L16.2744 8.69611C16.7572 8.21339 17.0215 7.55425 17.006 6.87175L16.9742 5.46465C16.9436 4.11666 15.8497 3.03572 14.5014 3.02138L13.1266 3.00676C12.4543 2.99961 11.8076 3.2635 11.3322 3.73885L4.35354 10.7175ZM14.8602 7.2819L7.88908 14.253C7.69381 14.4483 7.37723 14.4483 7.18197 14.253L5.76776 12.8388C5.57249 12.6436 5.57249 12.327 5.76776 12.1317L12.7464 5.15307C12.8415 5.058 12.9708 5.00522 13.1053 5.00665L14.4801 5.02127C14.7498 5.02414 14.9686 5.24033 14.9747 5.50992L15.0065 6.91703C15.0096 7.05353 14.9568 7.18536 14.8602 7.2819Z"></path> <path d="M11.0208 11.6066C11.2161 11.8019 11.2161 12.1185 11.0208 12.3137C10.8256 12.509 10.509 12.509 10.3137 12.3137L8.8995 10.8995C8.70424 10.7042 8.70424 10.3877 8.8995 10.1924C9.09476 9.99713 9.41134 9.99713 9.60661 10.1924L11.0208 11.6066Z" ></path> <path d="M5.71751 16.9099C6.10804 17.3004 6.10804 17.9336 5.71751 18.3241C5.32699 18.7146 4.69382 18.7146 4.3033 18.3241L1.47487 15.4957C1.08435 15.1052 1.08435 14.472 1.47487 14.0815C1.8654 13.6909 2.49856 13.6909 2.88909 14.0815L5.71751 16.9099Z" ></path> <path d="M9.38505 16.6709C9.77558 17.0614 9.77558 17.6945 9.38505 18.0851C8.99453 18.4756 8.36137 18.4756 7.97084 18.0851L2.00709 12.1213C1.61656 11.7308 1.61656 11.0976 2.00709 10.7071C2.39761 10.3166 3.03078 10.3166 3.4213 10.7071L9.38505 16.6709Z" ></path> <path d="M13.1421 9.48528C13.3374 9.68055 13.3374 9.99713 13.1421 10.1924C12.9469 10.3877 12.6303 10.3877 12.435 10.1924L11.0208 8.77818C10.8255 8.58292 10.8255 8.26633 11.0208 8.07107C11.2161 7.87581 11.5327 7.87581 11.7279 8.07107L13.1421 9.48528Z" ></path> <path d="M5 16.4142L3.58578 15L5 13.5858L6.41421 15L5 16.4142Z" ></path> <path d="M17.9703 0.970326C18.2632 0.677433 18.7381 0.677433 19.031 0.970326C19.3239 1.26322 19.3239 1.73809 19.031 2.03099L16.031 5.03099C15.7381 5.32388 15.2632 5.32388 14.9703 5.03099C14.6774 4.73809 14.6774 4.26322 14.9703 3.97033L17.9703 0.970326Z" ></path> </g></svg>  
                <h2>Dosage Info</h2>
            </div>
            <div class="input-area">
                <label for="syringe_type">Syringe Type</label>
                <select name="syringe_type" id="syringe_type">
                    <option value="100">U-100</option>
                    <option value="50">U-50</option>
                    <option value="30">U-30</option>
                </select>
            </div>

            <div class="input-area">
                <label for="dose_amount">Dose Amount</label>
                <input class="number" type="number" name="dose_amount" id="dose_amount">
                <select class="unit" name="dose_unit" id="dose_unit">
                    <option value="mg">mg</option>
                    <option value="mcg">mcg</option>
                </select>
            </div>
        </div>

        <div class="schedule-section input-section">
            <div class="input-title">
                <svg class="stroke" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g stroke-width="0"></g><g stroke-linecap="round" stroke-linejoin="round"></g><g> <path d="M3 9H21M7 3V5M17 3V5M6 13H8M6 17H8M11 13H13M11 17H13M16 13H18M16 17H18M6.2 21H17.8C18.9201 21 19.4802 21 19.908 20.782C20.2843 20.5903 20.5903 20.2843 20.782 19.908C21 19.4802 21 18.9201 21 17.8V8.2C21 7.07989 21 6.51984 20.782 6.09202C20.5903 5.71569 20.2843 5.40973 19.908 5.21799C19.4802 5 18.9201 5 17.8 5H6.2C5.0799 5 4.51984 5 4.09202 5.21799C3.71569 5.40973 3.40973 5.71569 3.21799 6.09202C3 6.51984 3 7.07989 3 8.2V17.8C3 18.9201 3 19.4802 3.21799 19.908C3.40973 20.2843 3.71569 20.5903 4.09202 20.782C4.51984 21 5.07989 21 6.2 21Z" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path> </g></svg>
                <h2>Schedule</h2>
            </div>

            <div class="input-area">
                <label for="schedule_type">Schedule Type</label>
                <select name="schedule_type" id="schedule_type">
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                    <option value="x_days">Every X Days</option>
                    <option value="on_off">On/Off</option>
                </select>
            </div>

            <div class="date-section visible" id="date_daily_section">
                <h1>date_daily_section</h1>
                <div class="input-area">
                    <label for="schedule_start_date_daily">Start Date</label>
                    <input type="date" name="schedule_start_date" id="schedule_start_date_daily">
                </div>
    
                <div class="input-area full">
                    <ul class="time-selecter">
                        <li id="add_time_daily">
                            <label for="add-time-daily">Add a Time</label>
                            <div class="button-group">
                                <button class="add-time" type="button" aria-label="Add Time"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M6 12H18M12 6V18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
                            </div>
                        </li> 
        
                        <li class="time-row">
                            <input class="time" type="time" value="08:00" name="time_input_1_daily" id="time_input_1_daily">
                            <div class="button-group">
                                <button class="time-remove" type="button" aria-label="Remove Time"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M18 6L17.1991 18.0129C17.129 19.065 17.0939 19.5911 16.8667 19.99C16.6666 20.3412 16.3648 20.6235 16.0011 20.7998C15.588 21 15.0607 21 14.0062 21H9.99377C8.93927 21 8.41202 21 7.99889 20.7998C7.63517 20.6235 7.33339 20.3412 7.13332 19.99C6.90607 19.5911 6.871 19.065 6.80086 18.0129L6 6M4 6H20M16 6L15.7294 5.18807C15.4671 4.40125 15.3359 4.00784 15.0927 3.71698C14.8779 3.46013 14.6021 3.26132 14.2905 3.13878C13.9376 3 13.523 3 12.6936 3H11.3064C10.477 3 10.0624 3 9.70951 3.13878C9.39792 3.26132 9.12208 3.46013 8.90729 3.71698C8.66405 4.00784 8.53292 4.40125 8.27064 5.18807L8 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="date-section" id="date_weekly_section">
            </div>

            <div class="date-section" id="date_x_days_section">
            </div>

            <div class="date-section" id="date_on_off_section">
                <h1>date_on_off_section</h1>
            </div>
            
        </div>
    </form>
